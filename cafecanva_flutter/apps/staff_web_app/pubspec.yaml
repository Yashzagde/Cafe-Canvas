name: staff_web_app
description: CafeCanvas — Staff Web PWA for clock-in, table management, menu toggling, and activity feed
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cafecanva_core:
    path: ../../packages/cafecanva_core
  cafecanva_ui:
    path: ../../packages/cafecanva_ui
  cafecanva_billing:
    path: ../../packages/cafecanva_billing
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  flutter_secure_storage: ^9.2.2
  geolocator: ^12.0.0
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  intl: ^0.19.0
  pdf: ^3.11.1
  printing: ^5.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
