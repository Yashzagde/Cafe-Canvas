  sqlite3_flutter_libs: ^0.5.22
  window_manager: ^0.4.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.19.0
  build_runner: ^2.4.11
