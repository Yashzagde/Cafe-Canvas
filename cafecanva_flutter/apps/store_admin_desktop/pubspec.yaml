name: store_admin_desktop
description: CafeCanva — desktop/web owner dashboard with offline-first Drift
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cafecanva_core:
    path: ../../packages/cafecanva_core
  cafecanva_ui:
    path: ../../packages/cafecanva_ui
  cafecanva_analytics:
    path: ../../packages/cafecanva_analytics
  cafecanva_billing:
    path: ../../packages/cafecanva_billing
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  drift: ^2.19.0
