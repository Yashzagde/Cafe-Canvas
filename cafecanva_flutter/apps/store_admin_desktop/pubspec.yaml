name: store_admin_desktop
description: Desktop & Web Store Admin App for CafeCanva.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  drift: ^2.20.0
  win32: ^5.13.0
  url_launcher: ^6.3.0
  cafecanva_core:
    path: ../../packages/cafecanva_core
  cafecanva_ui:
    path: ../../packages/cafecanva_ui
  cafecanva_billing:
    path: ../../packages/cafecanva_billing
  cafecanva_analytics:
    path: ../../packages/cafecanva_analytics
