name: cafecanva_flutter
repository: https://github.com/your-org/cafecanva_flutter

packages:
  - apps/*
  - packages/*

command:
  bootstrap:
    usePubspecOverrides: true
    runPubGetInParallel: true

scripts:
  analyze:
    run: melos exec -- flutter analyze --fatal-infos
    description: Static analysis across all packages and apps

  test:
    run: melos exec --depends-on="flutter_test" -- flutter test
    description: Run all unit and widget tests

  clean:
    run: melos exec -- flutter clean
    description: Clean all build artifacts

  format:
    run: melos exec -- dart format lib --set-exit-if-changed
    description: Format all Dart source files

  drift:build:
    run: dart run build_runner build --delete-conflicting-outputs
    packageFilters:
      scope: store_admin_desktop
    description: Generate Drift database schema

  deps:check:
    run: melos exec -- flutter pub deps
    description: Check dependency resolution
