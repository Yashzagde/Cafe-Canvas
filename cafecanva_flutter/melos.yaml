name: cafecanva_flutter
repository: https://github.com/Yashzagde/Cafe-Canva

packages:
  - apps/*
  - packages/*

command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  analyze:
    run: melos exec -- flutter analyze --no-fatal-infos
    description: Run flutter analyze in all packages

  test:
    run: melos exec -- flutter test
    description: Run flutter test in all packages

  build:android:staff:
    run: cd apps/staff_pos && flutter build apk --release
    description: Build Staff POS App APK

  build:android:admin:
    run: cd apps/store_admin_mobile && flutter build apk --release
    description: Build Store Admin Mobile APK

  build:windows:admin:
    run: cd apps/store_admin_desktop && flutter build windows --release
    description: Build Store Admin Desktop Windows

  clean:
    run: melos exec -- flutter clean
    description: Clean all packages
