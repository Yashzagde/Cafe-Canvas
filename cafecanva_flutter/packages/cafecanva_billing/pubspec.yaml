publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  esc_pos_utils_plus: ^2.1.0
  bluetooth_print: ^4.2.0
  pdf: ^3.11.1
  printing: ^5.13.1
  razorpay_flutter: ^1.3.6
  url_launcher: ^6.3.0
  cafecanva_core:
    path: ../cafecanva_core
  cafecanva_ui:
    path: ../cafecanva_ui
