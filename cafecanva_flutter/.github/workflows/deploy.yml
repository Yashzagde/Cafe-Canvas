name: CafeCanva — Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.22.0'

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos run analyze
      - run: melos run test

  build-android:
    name: Android APK — ${{ matrix.app }}
    needs: analyze
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [customer_storefront, staff_pos, kitchen_display, store_admin_mobile]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: dart pub global activate melos && melos bootstrap
      - name: Build APK
        working-directory: apps/${{ matrix.app }}
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=ENV=prod
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-apk
          path: apps/${{ matrix.app }}/build/app/outputs/flutter-apk/app-release.apk

  build-web:
    name: Web — ${{ matrix.app }}
    needs: analyze
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: customer_storefront
            vercel_project: cc-storefront
          - app: store_admin_desktop
            vercel_project: cc-admin
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: dart pub global activate melos && melos bootstrap
      - name: Build Web
        working-directory: apps/${{ matrix.app }}
        run: |
          flutter build web --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=ENV=prod
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: apps/${{ matrix.app }}/build/web

  build-windows:
    name: Windows Desktop
    needs: analyze
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: dart pub global activate melos && melos bootstrap
      - name: Build Windows
        working-directory: apps/store_admin_desktop
        run: |
          flutter build windows --release `
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} `
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} `
            --dart-define=ENV=prod
      - uses: actions/upload-artifact@v4
        with:
          name: store_admin_desktop-windows
          path: apps/store_admin_desktop/build/windows/x64/runner/Release/
