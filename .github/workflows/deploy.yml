name: Cafe Canva - Multi-App Deployment Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # Job 0: Validate Code Quality Early
  validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: npm ci --prefix frontend

      - name: Run Lint
        run: npm run lint --prefix frontend

      - name: Run Type Check
        run: npm run type-check --prefix frontend

  # Job 1: Apply Supabase Migrations
  database-migrations:
    runs-on: ubuntu-latest
    needs: validation
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply DB Migrations
        run: |
          supabase db push --db-url "${{ secrets.SUPABASE_DB_CONNECTION_STRING }}"
        if: env.SUPABASE_ACCESS_TOKEN != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # Job 2: Deploy SaaS Platform to Vercel
  deploy-saas-platform:
    runs-on: ubuntu-latest
    needs: [validation, database-migrations]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: npm ci --prefix frontend

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --project=cafe-canva-saas
        working-directory: ./frontend

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./frontend

      - name: Deploy SaaS Project to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./frontend

  # Job 3: Deploy Customer Storefront to Vercel
  deploy-storefront:
    runs-on: ubuntu-latest
    needs: [validation, database-migrations]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'Backend-Software/Store-Admin/store-front/package-lock.json'

      - name: Install Storefront Dependencies
        run: npm ci --prefix Backend-Software/Store-Admin/store-front

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --project=cafe-canva-storefront
        working-directory: ./Backend-Software/Store-Admin/store-front

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./Backend-Software/Store-Admin/store-front

      - name: Deploy Storefront to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./Backend-Software/Store-Admin/store-front
